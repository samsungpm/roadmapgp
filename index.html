        // ─────────────────────────────────────────────────────────────────
        // CLOUDFLARE WORKER — proxy sécurisé vers l'API Anthropic
        // La clé API est stockée côté Cloudflare, jamais dans ce fichier.
        // ─────────────────────────────────────────────────────────────────
        const WORKER_URL = "https://roadmap-asp-proxy.baptiste-araujo-pro.workers.dev";

        async function fetchASPFromClaude(productName, variant) {
            const prompt = `Recherche sur le web le prix de vente moyen constaté (Average Selling Price) en euros pour le smartphone "${productName}" version ${variant.ram} RAM / ${variant.rom} stockage, en France en 2025-2026.
Réponds UNIQUEMENT avec une estimation très courte du prix (exemples : "~1 200 €", "1 150 € – 1 300 €"). Pas d'explication, pas de justification.`;

            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "claude-sonnet-4-6",
                    max_tokens: 200,
                    tools: [{ type: "web_search_20250305", name: "web_search" }],
                    messages: [{ role: "user", content: prompt }]
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err?.error?.message || `HTTP ${response.status}`);
            }

            const data = await response.json();

            // Extraire le texte de la réponse (peut contenir plusieurs blocs)
            const textBlock = (data.content || []).find(b => b.type === "text");
            if (textBlock && textBlock.text && textBlock.text.trim()) {
                return textBlock.text.trim();
            }
            throw new Error("Réponse vide de l'IA");
        }

        // ─────────────────────────────────────────────────────────────────

        function ProductModal({ product, onClose }) {
            const [aspData, setAspData] = useState({});

            const fetchVariantASP = useCallback(async (variant, index) => {
                setAspData(prev => ({ ...prev, [index]: { loading: true, error: null, result: null } }));
                try {
                    const result = await fetchASPFromClaude(product.name, variant);
                    setAspData(prev => ({ ...prev, [index]: { loading: false, result } }));
                } catch (err) {
                    console.error("Erreur ASP :", err);
                    setAspData(prev => ({ ...prev, [index]: { loading: false, error: err.message || "Erreur IA" } }));
                }
            }, [product]);

                product.variants.forEach((variant, i) => {

                        fetchVariantASP(variant, i);
                    }

                                </div>
                            </div>
                        </div>
                    </main>

                    {/* MODAL */}
                    {selectedProduct && (
                        <ProductModal product={selectedProduct} onClose={() => setSelectedProduct(null)} />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
